syntax = "proto3";
option java_package = "com.litvidan.grpc";

service HashCrackerService {
  rpc Crack(CrackRequest) returns (CrackResponse);
}

message CrackRequest {
  string target_hash = 1;
  string alphabet = 2;
  int32 max_length = 3;
  int64 start_index = 4;
  int64 range_size = 5;
}

message CrackResponse {
  string found_word = 1;
}
